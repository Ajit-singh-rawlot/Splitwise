<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SplitPro</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<!-- scripts loaded at bottom of body -->

<style>
:root {
  --bg:#07090F;--card:#0F1623;--surface:#161E2E;--border:#1E2A3D;
  --accent:#F59E0B;--sky:#38BDF8;--text:#E2E8F0;--muted:#4B5A72;
  --muted2:#7C8FA6;--green:#10B981;--red:#EF4444;--purple:#A78BFA;
  --r:14px;--rs:10px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;overflow:hidden}
#app{display:flex;flex-direction:column;height:100vh;max-width:430px;margin:0 auto;position:relative}
#screen{flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:84px}
#screen::-webkit-scrollbar{display:none}

/* ── PAGES ── */
.page{display:none;min-height:100%}
.page.active{display:block}

/* ── AUTH PAGE ── */
#page-auth{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:32px 24px;background:radial-gradient(ellipse at 50% 0%,#1A2A4A 0%,var(--bg) 60%)}
.auth-logo{font-family:'Space Grotesk',sans-serif;font-size:36px;font-weight:700;margin-bottom:6px}
.auth-logo span{color:var(--accent)}
.auth-sub{color:var(--muted2);font-size:13px;margin-bottom:48px;text-align:center}
.auth-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:28px;width:100%;max-width:360px}
.auth-title{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;margin-bottom:6px}
.auth-desc{font-size:12px;color:var(--muted2);margin-bottom:24px;line-height:1.6}
.btn-google{width:100%;display:flex;align-items:center;justify-content:center;gap:10px;background:white;color:#1a1a1a;border:none;border-radius:var(--rs);padding:13px;font-size:14px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:opacity .15s}
.btn-google:active{opacity:.85}
.btn-google svg{width:20px;height:20px;flex-shrink:0}
.auth-note{font-size:11px;color:var(--muted);text-align:center;margin-top:16px;line-height:1.6}

/* ── TRIPS PAGE ── */
.topbar{padding:20px 16px 12px;display:flex;align-items:center;justify-content:space-between}
.topbar-title{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700}
.avatar-btn{width:36px;height:36px;border-radius:50%;border:2px solid var(--border);overflow:hidden;cursor:pointer;background:var(--surface);display:flex;align-items:center;justify-content:center;color:var(--muted2);font-size:14px;font-weight:600}
.avatar-btn img{width:100%;height:100%;object-fit:cover}
.trip-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin:0 16px 12px;cursor:pointer;transition:border-color .15s;position:relative;overflow:hidden}
.trip-card:active{border-color:var(--accent)}
.trip-card-accent{position:absolute;top:0;left:0;width:4px;height:100%;border-radius:4px 0 0 4px}
.trip-card-name{font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:700;margin-bottom:4px}
.trip-card-meta{font-size:12px;color:var(--muted2)}
.trip-card-stats{display:flex;gap:16px;margin-top:12px}
.tc-stat{font-size:11px;color:var(--muted)}
.tc-stat span{display:block;font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:700;color:var(--text);margin-bottom:1px}
.new-trip-btn{margin:0 16px;background:rgba(245,158,11,.1);border:1px dashed rgba(245,158,11,.4);border-radius:var(--r);padding:16px;display:flex;align-items:center;justify-content:center;gap:8px;color:var(--accent);font-size:14px;font-weight:600;cursor:pointer;font-family:'Space Grotesk',sans-serif}
.new-trip-btn:active{opacity:.7}
.empty-trips{text-align:center;padding:60px 24px;color:var(--muted)}
.empty-trips .ei{font-size:48px;margin-bottom:16px}
.empty-trips .et{font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:600;color:var(--muted2);margin-bottom:6px}
.empty-trips .es{font-size:12px;line-height:1.6}

/* ── TRIP HEADER ── */
.trip-header{background:linear-gradient(160deg,#0D1B3E 0%,#1A2438 60%,var(--bg) 100%);padding:20px 16px 0;position:relative;overflow:hidden}
.trip-header::after{content:'';display:block;height:50px;background:url("data:image/svg+xml,%3Csvg viewBox='0 0 430 50' xmlns='http://www.w3.org/2000/svg'%3E%3Cpolygon points='0,50 0,30 50,8 100,22 150,2 200,18 250,0 300,15 350,4 400,16 430,10 430,50' fill='%2307090F'/%3E%3C/svg%3E") no-repeat bottom/100%;margin-top:6px}
.stars{position:absolute;top:0;left:0;right:0;height:90px;pointer-events:none;overflow:hidden}
.star{position:absolute;background:white;border-radius:50%;animation:twinkle 3s infinite}
@keyframes twinkle{0%,100%{opacity:.8}50%{opacity:.15}}
.th-back{background:rgba(255,255,255,.08);border:none;border-radius:8px;padding:6px 10px;color:var(--text);font-size:13px;cursor:pointer;font-family:'Inter',sans-serif;display:flex;align-items:center;gap:5px;margin-bottom:12px;position:relative;z-index:1}
.th-row{display:flex;justify-content:space-between;align-items:flex-start;position:relative;z-index:1}
.th-name{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:700}
.th-sub{font-size:12px;color:var(--muted2);margin-top:2px}
.th-total-label{font-size:10px;color:var(--muted);text-align:right}
.th-total{font-family:'Space Grotesk',sans-serif;font-size:24px;font-weight:700;color:var(--accent);text-align:right}

/* ── SUMMARY ROW ── */
.summary-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:16px}
.sum-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px}
.sum-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;font-weight:600}
.sum-value{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:700;margin-top:4px}
.sum-sub{font-size:10px;color:var(--muted2);margin-top:2px}
.section-title{font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;padding:0 16px 10px}

/* ── MEMBER SCROLL ── */
.members-scroll{display:flex;gap:10px;padding:0 16px 16px;overflow-x:auto}
.members-scroll::-webkit-scrollbar{display:none}
.member-card{flex-shrink:0;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px;width:136px}
.member-avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:700;margin-bottom:8px}
.member-name{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.member-paid{font-size:11px;color:var(--muted2);margin-top:2px}
.member-balance{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:700;margin-top:8px}
.pos{color:var(--green)}.neg{color:var(--red)}.neutral{color:var(--muted2)}

/* ── SETTLE ── */
.settle-list{padding:0 16px;display:flex;flex-direction:column;gap:8px}
.settle-item{background:var(--card);border:1px solid var(--border);border-radius:var(--rs);padding:12px 14px;display:flex;align-items:center;gap:10px}
.settle-amt{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:15px;color:var(--accent);margin-left:auto}
.settle-btn{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);color:var(--green);border-radius:6px;padding:5px 10px;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:'Inter',sans-serif}
.settled-tag{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);color:var(--green);border-radius:6px;padding:5px 10px;font-size:11px;font-weight:600}

/* ── TX LIST ── */
.search-bar{margin:0 16px 10px;background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);display:flex;align-items:center;gap:8px;padding:0 12px}
.search-bar input{flex:1;background:none;border:none;outline:none;color:var(--text);padding:10px 0;font-size:13px;font-family:'Inter',sans-serif}
.search-bar input::placeholder{color:var(--muted)}
.filter-tabs{display:flex;gap:8px;padding:0 16px 10px;overflow-x:auto}
.filter-tabs::-webkit-scrollbar{display:none}
.ftab{flex-shrink:0;padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted2);font-size:12px;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s}
.ftab.active{background:rgba(245,158,11,.12);border-color:rgba(245,158,11,.4);color:var(--accent)}
.tx-list{padding:0 16px;display:flex;flex-direction:column;gap:8px}
.tx-item{background:var(--card);border:1px solid var(--border);border-radius:var(--rs);padding:12px 14px;display:grid;grid-template-columns:36px 1fr auto;gap:10px;align-items:center;cursor:pointer;transition:border-color .15s}
.tx-item:active{border-color:var(--accent)}
.tx-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.tx-desc{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tx-meta{font-size:11px;color:var(--muted2);margin-top:2px}
.tx-chips{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px;grid-column:2/-1}
.chip{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:500}
.tx-amount{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:700;text-align:right}
.tx-share{font-size:10px;color:var(--muted);text-align:right;margin-top:2px}

/* ── ACTIVITY ── */
.activity-list{padding:0 16px;display:flex;flex-direction:column;gap:0}
.activity-item{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);position:relative}
.activity-item:last-child{border-bottom:none}
.act-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px}
.act-line{position:absolute;left:3px;top:20px;bottom:-12px;width:2px;background:var(--border)}
.activity-item:last-child .act-line{display:none}
.act-body{flex:1}
.act-msg{font-size:13px;line-height:1.5}
.act-time{font-size:11px;color:var(--muted);margin-top:3px}
.act-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;padding:2px 8px;border-radius:20px;font-weight:600;margin-top:4px}

/* ── BOTTOM NAV ── */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(15,22,35,.95);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;padding:8px 0 max(8px,env(safe-area-inset-bottom));z-index:50}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px;cursor:pointer;border:none;background:none;color:var(--muted);transition:color .15s;font-family:'Inter',sans-serif}
.nav-item.active{color:var(--accent)}
.nav-icon{font-size:20px}
.nav-label{font-size:10px;font-weight:500}

/* ── FAB ── */
.fab{position:fixed;bottom:90px;right:20px;width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#D97706);border:none;color:#07090F;font-size:24px;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 20px rgba(245,158,11,.4);z-index:100;transition:transform .15s;font-weight:700}
.fab:active{transform:scale(.92)}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:flex-end;backdrop-filter:blur(4px);opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--card);border-radius:22px 22px 0 0;border:1px solid var(--border);border-bottom:none;padding:20px;width:100%;max-height:92vh;overflow-y:auto;transform:translateY(100%);transition:transform .25s cubic-bezier(.25,1,.5,1)}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 20px}
.modal-title{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;margin-bottom:16px}
.form-group{margin-bottom:14px}
.form-label{font-size:11px;font-weight:600;color:var(--muted2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;display:block}
.form-input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:12px;color:var(--text);font-size:14px;font-family:'Inter',sans-serif;outline:none;transition:border-color .15s}
.form-input:focus{border-color:var(--accent)}
select.form-input{appearance:none}
.ptoggle-row{display:flex;flex-wrap:wrap;gap:8px}
.ptoggle{padding:7px 14px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--muted2);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;font-family:'Inter',sans-serif}
.ptoggle.sel{border-color:var(--accent);background:rgba(245,158,11,.12);color:var(--accent)}
.btn-primary{width:100%;padding:14px;background:linear-gradient(135deg,var(--accent),#D97706);border:none;border-radius:var(--rs);color:#07090F;font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:opacity .15s}
.btn-primary:active{opacity:.85}
.btn-secondary{width:100%;padding:12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);color:var(--muted2);font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:600;cursor:pointer}
.btn-danger{width:100%;padding:12px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:var(--rs);color:var(--red);font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:600;cursor:pointer}
.btn-row{display:flex;gap:10px;margin-top:8px}
.amount-wrap{position:relative}
.amount-wrap::before{content:'₹';position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted2);z-index:1}
.amount-wrap input{padding-left:26px}

/* ── DETAIL MODAL ── */
.detail-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)}
.detail-row:last-child{border-bottom:none}
.detail-label{font-size:12px;color:var(--muted2)}
.detail-value{font-size:13px;font-weight:500}

/* ── TOAST ── */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-80px);background:var(--green);color:white;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;z-index:400;transition:transform .3s;white-space:nowrap;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.err{background:var(--red)}

/* ── LOADING ── */
.spinner{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-screen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:500;gap:16px}
.loading-screen .ls-logo{font-family:'Space Grotesk',sans-serif;font-size:28px;font-weight:700}
.loading-screen .ls-logo span{color:var(--accent)}

/* ── MISC ── */
.stats-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:0 16px 16px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--rs);padding:12px 10px;text-align:center}
.stat-val{font-family:'Space Grotesk',sans-serif;font-size:17px;font-weight:700}
.stat-lbl{font-size:10px;color:var(--muted);margin-top:3px}
.divider{height:1px;background:var(--border);margin:0 16px 16px}
.pill{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.user-menu{position:fixed;top:60px;right:16px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:12px;z-index:150;min-width:200px;display:none}
.user-menu.open{display:block}
.um-name{font-size:13px;font-weight:600;margin-bottom:2px}
.um-email{font-size:11px;color:var(--muted2);margin-bottom:12px}
.um-btn{width:100%;padding:10px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);border-radius:8px;color:var(--red);font-size:13px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif}

/* NEW/EDIT TRIP */
.color-swatches{display:flex;gap:8px;flex-wrap:wrap}
.swatch{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:border-color .15s}
.swatch.sel{border-color:white}
</style>
</head>
<body>

<!-- LOADING -->
<div class="loading-screen" id="loading-screen">
  <div class="ls-logo">Split<span>Pro</span></div>
  <div class="spinner"></div>
</div>

<div id="app" style="display:none">
  <!-- ── AUTH PAGE ── -->
  <div class="page active" id="page-auth">
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:32px 24px;background:radial-gradient(ellipse at 50% 0%,#1A2A4A 0%,var(--bg) 65%)">
      <div style="font-size:52px;margin-bottom:8px">✈️</div>
      <div style="font-family:'Space Grotesk',sans-serif;font-size:32px;font-weight:700;margin-bottom:4px">Split<span style="color:var(--accent)">Pro</span></div>
      <div style="color:var(--muted2);font-size:13px;margin-bottom:48px;text-align:center">Smart expense splitting<br>for group trips</div>
      <div style="background:var(--card);border:1px solid var(--border);border-radius:20px;padding:28px;width:100%;max-width:360px">
        <div style="font-family:'Space Grotesk',sans-serif;font-size:17px;font-weight:700;margin-bottom:6px">Welcome back</div>
        <div style="font-size:12px;color:var(--muted2);margin-bottom:24px;line-height:1.6">Sign in with Google to access your trips. Your data is encrypted — only people with the trip password can read it.</div>
        <button class="btn-google" onclick="signInWithGoogle()">
          <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Continue with Google
        </button>
        <div style="font-size:11px;color:var(--muted);text-align:center;margin-top:16px;line-height:1.6">Your trip data is AES-256 encrypted.<br>We never store your passwords.</div>
      </div>
    </div>
  </div>

  <!-- ── TRIPS PAGE ── -->
  <div class="page" id="page-trips">
    <div id="screen-trips" style="overflow-y:auto;height:100vh;padding-bottom:20px">
      <div class="topbar">
        <div>
          <div class="topbar-title">My Trips</div>
          <div style="font-size:11px;color:var(--muted2)" id="trips-user-email"></div>
        </div>
        <div class="avatar-btn" id="avatar-btn" onclick="toggleUserMenu()">
          <span id="avatar-initials">?</span>
        </div>
      </div>
      <div class="user-menu" id="user-menu">
        <div class="um-name" id="um-name"></div>
        <div class="um-email" id="um-email"></div>
        <button class="um-btn" onclick="signOut()">Sign Out</button>
      </div>
      <div id="trips-list"></div>
      <div style="height:16px"></div>
      <div class="new-trip-btn" onclick="openNewTripModal()">＋ Create New Trip</div>
    </div>
  </div>

  <!-- ── TRIP DETAIL PAGE ── -->
  <div class="page" id="page-trip">
    <div id="screen" style="flex:1;overflow-y:auto;padding-bottom:84px">

      <!-- HOME TAB -->
      <div class="tab-view active" id="tab-home">
        <div class="trip-header">
